services:
  - type: web
    name: daksh-backend
    env: python
    region: singapore
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -k uvicorn.workers.UvicornWorker main:app -b 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false
      - key: BHASHINI_USER_ID
        sync: false
      - key: BHASHINI_API_KEY
        sync: false
      - key: BHASHINI_INFERENCE_KEY
        sync: false
